name: Build and Release Executables

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system .
          uv pip install --system pyinstaller

      - name: Build executable with PyInstaller
        shell: bash
        run: |
          uv run pyinstaller --onefile \
            --hidden-import=yt_dlp \
            --hidden-import=ytmusicapi \
            --hidden-import=mutagen \
            --hidden-import=argss \
            --collect-all yt_dlp \
            --collect-all ytmusicapi \
            --collect-all mutagen \
            --name fm-dlp \
            fm_dlp/cli.py

      - name: Rename executable for each OS
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/fm-dlp.exe dist/fm-dlp-windows.exe
          elif [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            mv dist/fm-dlp dist/fm-dlp-linux
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            mv dist/fm-dlp dist/fm-dlp-macos
          fi

      - name: Upload executables to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            dist/fm-dlp-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload executables as Artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: fm-dlp-${{ matrix.os }}
          path: dist/fm-dlp-*
